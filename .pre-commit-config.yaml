repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0  # latest version
    hooks:
      - id: gitleaks
        args: ['--verbose', '--redact']
  - repo: local
    hooks:
      - id: lint-staged
        name: lint-staged (ESLint)
        entry: pnpm run lint-staged
        language: system
        pass_filenames: false
